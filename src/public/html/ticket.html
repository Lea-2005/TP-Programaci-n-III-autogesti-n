<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Librería | Ticket</title>
        <link rel="icon" href="../assets/libreria.png">

        <link rel="stylesheet" href="../css/global.css">
        <link rel="stylesheet" href="../css/ticket.css">
        
        <script src="../js/tema.js"></script>
        <script src="../js/ticket.js"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<body>
    <header>
        <div class="header-left">
            <img src="../assets/libreria.png" alt="logo" class="logo">
            <h1>Librería</h1>
        </div>
        <div class="header-right">
            <button id="btn-tema">🌑</button>
        </div>
    </header>

    <main>
        <div class="contenedor-ticket">
            <div class="ticket-header">
                <h2 class="pg-titulo">Ticket de compra</h2>
                <p class="fecha">Fecha: <span id="fecha-hora"></span></p>
                <p class="cliente">Cliente: <span id="nombre-cliente"></span></p>
            </div>

            <div class="ticket-info">
                <table class="tabla-ticket">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                        </tr>
                        <thead>
                            <tbody id="tabla-ticket-info">
                                <!--
                                JavaScript
                                -->
                            </tbody>
                        </thead>
                    </thead>
                </table>
            </div>
            
            <div class="ticket-footer">
                <p><strong>TOTAL:</strong></p>
                <p><span id="total-general"></span></p>
            </div>

            <div class="ticket-acciones">
                <button id="btn-descargar-pdf">Imprimir ticket</button>
                <button id="btn-salir">Salir</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-derecho">
            <p>Recuperatorio: Leandro Mamani — Programación III</p>
        </div>
        <div class="footer-izquierdo">
            <a href="/admin/login">Login admin</a>
        </div>
    </footer>
</body>
</html>
