<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Librería | Bienvenida</title>
        <link rel="icon" href="../assets/libreria.png">

        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/bienvenida.css">

        <script src="/js/main.js"></script>
        <script src="/js/bienvenida.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="/assets/libreria.png" alt="logo" class="logo">
            <h1>Librería</h1>
        </div>
        <div class="header-right">
            <button id="btn-tema">🌑</button>
        </div>
    </header>

    <main class="bienvenida-container">
        <div class="bienvenida-card">
            <h2>Bienvenido a Librería</h2>
            <p>¡Ingresá tu nombre para poder comenzar a navegar!</p>
            <form id="form-bienvenida">
                <input type="text" id="nombre-usuario" placeholder="Tu nombre..." required autofocus>
                <button type="submit">Continuar ➡</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-derecho">
            <p>Recuperatorio: Leandro Mamani — Programación III</p>
        </div>
        <div class="footer-izquierdo">
            <a href="/admin/login">Login admin</a>
        </div>
    </footer>
</body>
</html>
