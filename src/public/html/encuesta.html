<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería | Encuesta</title>
    <link rel="icon" href="/assets/libreria.png">

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/encuesta.css">

    <script src="/js/main.js"></script>
    <script src="/js/encuesta.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <img src="/assets/libreria.png" alt="logo" class="logo">
            <h1>Librería</h1>
        </div>
        <div class="header-right">
            <button id="btn-tema">🌑</button>
        </div>
    </header>

    <main>
        <h2 class="pg-titulo">Encuesta de satisfacción</h2>
        
        <form id="form-encuesta" method="POST">

            <div class="campo">
                <label for="comentario">💬 - Comentario sobre tu experiencia:</label>
                <textarea id="comentario" name="comentario" rows="4"
                    placeholder="Cuenta cómo fue tu experiencia..."></textarea>
            </div>

            <div class="campo">
                <label for="email">📂 - Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                <div class="error-msg" id="email-error" style="display:none;">Email inválido</div>
            </div>

            <div class="campo checkbox">
                <input type="checkbox" id="suscripcion" name="suscripcion">
                <label for="suscripcion">📬 - ¿Deseas recibir novedades por correo?</label>
            </div>

            <div class="campo">
                <label for="puntuacion">⭐ - Puntuación del servicio (1-5): <span id="valor-puntuacion">3</span></label>
                <input type="range" id="puntuacion" name="puntuacion" min="1" max="5" value="3" step="1">
            </div>

            <div class="campo">
                <label for="imagen_url">🖼️ - URL de tu libro favorito:</label>
                <input type="text" id="imagen_url" name="imagen_url" placeholder="https://ejemplo.com/libro.jpg">
            </div>

            <div class="encuesta-acciones">
                <button type="submit" class="btn-enviar">Enviar encuesta</button>
                <button type="button" class="btn-omitir" onclick="omitirEncuesta()">Omitir</button>
            </div>

        </form>
    </main>

    <footer>
        <div class="footer-derecho">
            <p>Recuperatorio: Leandro Mamani — Programación III</p>
        </div>
        <div class="footer-izquierdo">
            <a href="/admin/login">Login admin</a>
        </div>
    </footer>
</body>
</html>
