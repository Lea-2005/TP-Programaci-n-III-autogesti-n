<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería | Encuesta</title>
    <link rel="icon" href="../assets/libreria.png">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/encuesta.css">

    <script src="../js/tema.js"></script>
    <script src="../js/encuesta.js"></script>
</head>

<body>
    <header>
        <div class="header-left">
            <img src="../assets/libreria.png" alt="logo" class="logo">
            <h1>Librería</h1>
        </div>
        <div class="header-right">
            <button id="btn-tema">🌑</button>
        </div>
    </header>

    <main>
        <h2 class="pg-titulo">Encuesta de satisfacción</h2>
        <form action="" method="POST">

            <div class="campo">
                <label for="texto-opinion">Deja una opinión:</label>
                <input type="text" placeholder="📋 Escribí tu opinión...">
            </div>

            <div class="campo">
                <label for="correo-cliente">Correo electrónico:</label>
                <input type="email" placeholder="📝 Escribí tu correo..." required>
            </div>

            <div class="campo">
                <label for="caja-verificacion">Caja de verificación...</label>
                <input type="checkbox" required>
            </div>

            <div class="campo">
                <label for="correo">Estado:</label>
                <input type="range" id="opinion" name="opinion" min="1" max="5" step="1" value="3">
            </div>

            <div class="campo">
                <label for="correo">Imagen:</label>
                <input type="file" required>
            </div>
        </form>
    </main>

    <footer>
        <div class="footer-derecho">
            <p>Recuperatorio: Leandro Mamani — Programación III</p>
        </div>
        <div class="footer-izquierdo">
            <a href="/admin/login">Login admin</a>
        </div>
    </footer>
</body>
</html>
